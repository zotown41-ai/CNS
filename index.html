<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文献追踪</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;max-width:900px;margin:40px auto;padding:0 16px;line-height:1.7;color:#222}
    h1{margin-bottom:8px}
    .card{border:1px solid #e5e7eb;border-radius:14px;padding:20px;margin:18px 0;box-shadow:0 2px 10px rgba(0,0,0,.04)}
    a{color:#2563eb;text-decoration:none} a:hover{text-decoration:underline}
    .muted{color:#666}
    code{background:#f3f4f6;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <h1>文献追踪</h1>
  <p class="muted">静态发布入口：周报来自 CNS 周报项目；日报来自 RSS 论文追踪项目。</p>
  <div class="card">
    <h2>周报</h2>
    <p>子目录：<code>[周报]</code></p>
    <p><a href="./[周报]/">打开周报</a></p>
  </div>
  <div class="card">
    <h2>日报</h2>
    <p>子目录：<code>[日报]</code></p>
    <p><a href="./[日报]/">打开日报</a></p>
  </div>
</body>
</html>
